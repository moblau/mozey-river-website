<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-44KVKB4R38"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-44KVKB4R38');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://mozeyriver.com/heart.png" />
    <meta property="og:image:width" content="500" />
    <meta property="og:image:height" content="500" />
    <meta property="og:title" content="Mozey River - Quadraplex" />
    <meta property="og:description" content="Quadraplex" />

    <title>Mozey River - Quadraplex</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        #p5-background {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        #p5-foreground {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .content-wrapper {
            max-width: 2000px;
            width: 90vw;
        }
        .pdf-frame {
            width: 100%;
            height: 800px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }
        .audio-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .audio-section p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
        }
        .audio-track {
            margin-bottom: 1rem;
        }
        .audio-track label {
            display: block;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 0.3rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .audio-track audio {
            width: 100%;
        }
    </style>
</head>
<body style="overflow-y: auto; height:100%">
    <div id="p5-background"></div>
    <div id="p5-foreground"></div>

    <div class="m-4 p-3 content-wrapper text-center mt-5">
        <h1 class="m-4">Quadraplex</h1>
        <div class="mb-4">
            <a href="https://github.com/moblau/Quadraplex" target="_blank" rel="noopener">
                <img class="rounded-lg bg-white thumbnail-image" src="github.png" alt="GitHub">
            </a>
        </div>
        <div class="container p-2 text-left audio-section">
            <p>All synths in these tracks are made using Quadraplex.</p>
            <div class="audio-track">
                <label>Demo 1</label>
                <audio controls>
                    <source src="quadraplex demo1.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="audio-track">
                <label>Demo 2</label>
                <audio controls>
                    <source src="quadraplex demo2.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
        <div class="container p-2 text-left">
            <embed class="pdf-frame" src="Quadraplex%20Report.pdf" type="application/pdf">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="js/p5background.js"></script>
</body>
</html>
